                    'Next: Enter Run Data →',
                  ),
                ),
              ),

            // ════════════════════════════════════════
            // STEP 1 — DATA ENTRY
            // ════════════════════════════════════════
            step === 1 &&
              h(
                'div',
                null,
                h(
                  'div',
                  {
                    className: 'no-print',
                    style: { display: 'flex', gap: 8, marginBottom: 20 },
                  },
                  ...LEVELS.map((l) => {
                    const hasData =
                      runs[l].filter((v) => v !== '' && !isNaN(parseFloat(v)))
                        .length >= 4;
                    const s = stats[l];
                    const b = biasResults[l];
                    const cv = s.mean !== null ? cvStatus(s.cv, cvLimit) : null;
                    const biasOk = b ? b.pass : true;
                    const biasReview = b ? b.conversionWarning : false;
                    const status = hasData
                      ? biasOk === false || cv === 'fail'
                        ? 'fail'
                        : cv === 'warn' || biasReview
                          ? 'warn'
                          : cv === 'pass' && biasOk
                            ? 'pass'
                            : null
                      : null;
                    return h(
                      'button',
                      {
                        key: l,
                        onClick: () => setActiveLevel(l),
                        style: {
                          padding: '10px 18px',
                          borderRadius: 10,
                          fontFamily: 'inherit',
                          cursor: 'pointer',
                          fontSize: 14,
                          fontWeight: 700,
                          letterSpacing: 0,
                          textTransform: 'none',
                          border: `1px solid ${activeLevel === l ? C.accent : C.border}`,
                          background:
                            activeLevel === l ? C.accentSoft : 'transparent',
                          color: activeLevel === l ? C.accent : C.muted,
                        },
                      },
                      l.split(' ')[0] + ' ' + l.split(' ')[1],
                      status === 'pass' &&
                        h(
                          'span',
                          { style: { marginLeft: 6, color: C.green } },
                          '✓',
                        ),
                      status === 'fail' &&
                        h(
                          'span',
                          { style: { marginLeft: 6, color: C.red } },
                          '✗',
                        ),
                      status === 'warn' &&
                        h(
                          'span',
                          { style: { marginLeft: 6, color: C.yellow } },
                          '⚠',
                        ),
                    );
                  }),
                ),

                h(
                  'div',
                  { style: S.card },
                  h(
                    'div',
                    {
                      style: {
                        display: 'flex',
                        justifyContent: 'space-between',
                        alignItems: 'center',
                        marginBottom: 20,
                      },
                    },
                    h('div', { style: S.sec }, `${activeLevel} — New Lot Runs`),
                    h(
                      'span',
                      { style: { color: C.muted, fontSize: 14 } },
                      `${meta.analyte} · Lot ${meta.newLot}`,
                    ),
                  ),

                  // Run inputs
                  h(
                    'div',
                    {
                      style: {
                        display: 'grid',
                        gridTemplateColumns: 'repeat(5,1fr)',
                        gap: 10,
                        marginBottom: 16,
                      },
                    },
                    ...Array(N_RUNS)
                      .fill(null)
                      .map((_, i) => {
                        const isExcluded = excludedOutliers[activeLevel] === i;
                        const g = grubbsResults[activeLevel];
                        const isFlagged =
                          g &&
                          g.isOutlier &&
                          g.idx === i &&
                          excludedOutliers[activeLevel] === null;
                        return h(
                          'div',
                          { key: i },
                          h(
                            'label',
                            {
                              style: {
                                ...S.lbl,
                                color: isExcluded
                                  ? C.red
                                  : isFlagged
                                    ? C.yellow
                                    : C.muted,
                              },
                            },
                            `Run ${i + 1}`,
                            isExcluded ? ' [EXCL]' : isFlagged ? ' [?]' : '',
                          ),
                          h('input', {
                            style: {
                              ...S.inp,
                              textAlign: 'right',
                              fontSize: 15,
                              opacity: isExcluded ? 0.35 : 1,
                              borderColor: isExcluded
                                ? C.red
                                : isFlagged
                                  ? C.yellow
                                  : C.border,
                              background: isExcluded
                                ? '#2a0f0f'
                                : isFlagged
                                  ? C.yellowBg
                                  : C.surface,
                            },
                            type: 'number',
                            step: 'any',
                            value: runs[activeLevel][i],
                            placeholder: '—',
                            disabled: isExcluded,
                            onChange: (e) => {
                              const u = [...runs[activeLevel]];
                              u[i] = e.target.value;
                              setRuns((p) => ({ ...p, [activeLevel]: u }));
                            },
                          }),
                        );
                      }),
                  ),

                  // Grubbs panel
                  grubbsResults[activeLevel] &&
                    grubbsResults[activeLevel].isOutlier &&
                    h(
                      'div',
                      {
                        style: {
                          background: C.yellowBg,
                          border: `1px solid ${C.yellowBorder}`,
                          borderRadius: 9,
                          padding: '14px 18px',
                          marginBottom: 16,
                        },
                      },
                      h(
                        'div',
                        {
                          style: {
                            fontSize: 14,
                            color: C.yellow,
                            fontWeight: 700,
                            letterSpacing: 0,
                            textTransform: 'none',
                            marginBottom: 8,
                          },
                        },
                        '⚠ Grubbs Outlier Detected',
                      ),
                      h(
                        'div',
                        {
                          style: {
                            fontSize: 14,
                            color: C.text,
                            marginBottom: 10,
                          },
                        },
                        `Run ${grubbsResults[activeLevel].idx + 1} (value: ${fmt(grubbsResults[activeLevel].value, 3)}) — G = ${fmt(grubbsResults[activeLevel].G, 3)} exceeds critical value of ${GRUBBS_CRITICAL_N5} (n=5, p<0.05).`,
                      ),
                      excludedOutliers[activeLevel] === null
                        ? h(
                            'div',
                            null,
                            h(
                              'div',
                              { style: { marginBottom: 8 } },
                              h(
                                'label',
                                { style: { ...S.lbl, color: C.muted } },
                                'Reason for exclusion (required before excluding)',
                              ),
                              h('input', {
                                style: S.inp,
                                value: outlierReasons[activeLevel],
                                placeholder:
                                  'e.g. pipetting error, bubble observed in cuvette...',
                                onChange: (e) =>
                                  setOutlierReasons((p) => ({
                                    ...p,
                                    [activeLevel]: e.target.value,
                                  })),
                              }),
                            ),
                            h(
                              'div',
                              {
                                style: {
                                  display: 'flex',
                                  gap: 10,
                                  marginTop: 10,
                                },
                              },
                              h(
                                'button',
                                {
                                  style: {
                                    ...btnStyle('danger'),
                                    opacity: !outlierReasons[activeLevel]
                                      ? 0.4
                                      : 1,
                                  },
                                  disabled: !outlierReasons[activeLevel],
                                  onClick: () =>
                                    setExcludedOutliers((p) => ({
                                      ...p,
                                      [activeLevel]:
                                        grubbsResults[activeLevel].idx,
                                    })),
                                },
                                'Exclude Run ' +
                                  (grubbsResults[activeLevel].idx + 1),
                              ),
                              h(
                                'button',
                                {
                                  style: btnStyle('secondary'),
                                  onClick: () =>
                                    setOutlierReasons((p) => ({
                                      ...p,
                                      [activeLevel]: '',
                                    })),
                                },
                                'Keep All Runs',
                              ),
                            ),
                          )
                        : h(
                            'div',
                            {
                              style: {
                                display: 'flex',
                                alignItems: 'center',
                                justifyContent: 'space-between',
                              },
                            },
                            h(
                              'div',
                              { style: { fontSize: 12, color: C.green } },
                              '✓ Outlier excluded — ' +
                                outlierReasons[activeLevel],
                            ),
                            h(
                              'button',
                              {
                                style: { ...btnStyle('ghost'), fontSize: 11 },
                                onClick: () => {
                                  setExcludedOutliers((p) => ({
                                    ...p,
                                    [activeLevel]: null,
                                  }));
                                  setOutlierReasons((p) => ({
                                    ...p,
                                    [activeLevel]: '',
                                  }));
                                },
                              },
                              'Undo exclusion',
                            ),
                          ),
                    ),

                  // Stats summary
                  stats[activeLevel].n > 0 &&
                    h(
                      'div',
                      { style: { ...S.g3, marginBottom: 20 } },
                      ...(() => {
                        const s = stats[activeLevel],
                          b = biasResults[activeLevel];
                        const cv = cvStatus(s.cv, cvLimit);
                        const biasPass = b ? b.pass : null;
                        return [
                          [
                            `Mean${selectedUnit ? ' (' + selectedUnit + ')' : ''}`,
                            fmt(s.mean),
                            null,
                            'neutral',
                          ],
                          [
                            `SD${selectedUnit ? ' (' + selectedUnit + ')' : ''}`,
                            fmt(s.sd),
                            null,
                            'neutral',
                          ],
                          ['%CV', fmt(s.cv, 2) + '%', s.cv, cv],
                          ...(b
                            ? [
                                [
                                  `Bias vs Old Lot`,
                                  fmt(b.diff, 3) +
                                    (b.unit ? ' ' + b.unit : '') +
                                    (b.pctDiff !== undefined
                                      ? ' (' + fmt(b.pctDiff, 1) + '%)'
                                      : ''),
                                  null,
                                  b.conversionWarning
                                    ? 'warn'
                                    : b.pass
                                      ? 'pass'
                                      : 'fail',
                                ],
                              ]
                            : []),
                          ...(b
                            ? [
                                [
                                  `APS Limit`,
                                  b.limitType,
                                  null,
                                  b.conversionWarning
                                    ? 'warn'
                                    : b.pass
                                      ? 'pass'
                                      : 'fail',
                                ],
                              ]
                            : []),
                        ];
                      })().map(([label, val, _cv, status]) =>
                        h(
                          'div',
                          {
                            key: label,
                            style: {
                              ...S.sbox,
                              border: `1px solid ${status === 'fail' ? C.redBorder : status === 'warn' ? C.yellowBorder : status === 'pass' ? C.greenBorder : C.border}`,
                              gridColumn: label.startsWith('APS')
                                ? 'span 2'
                                : 'span 1',
                            },
                          },
                          h(
                            'div',
                            {
                              style: {
                                fontSize:
                                  status === 'pass' ||
                                  status === 'warn' ||
                                  status === 'fail'
                                    ? 14
                                    : 18,
                                fontWeight: 700,
                                lineHeight: 1.2,
                                color:
                                  status === 'fail'
                                    ? C.red
                                    : status === 'warn'
                                      ? C.yellow
                                      : status === 'pass'
                                        ? C.green
                                        : C.text,
                                wordBreak: 'break-word',
                              },
                            },
                            val,
                          ),
                          h(
                            'div',
                            {
                              style: {
                                fontSize: 13,
                                color: C.muted,
                                letterSpacing: 0,
                                textTransform: 'none',
                                marginTop: 4,
                              },
                            },
                            label,
                            status !== 'neutral' &&
                              badge(status, cvStatusLabel(status)),
                          ),
                        ),
                      ),
                    ),

                  // LJ Chart
                  h(
                    'div',
                    {
                      style: {
                        fontSize: 14,
                        color: C.muted,
                        letterSpacing: 0,
                        marginBottom: 10,
                      },
                    },
                    'Levey-Jennings - ' + activeLevel,
                  ),
	                  h(LJChart, {
	                    runs: runs[activeLevel],
	                    mean: stats[activeLevel].mean,
	                    sd: stats[activeLevel].sd,
	                    prevMean: prevStats[activeLevel].mean,
	                  }),
                  h(
                    'div',
                    {
                      style: {
                        display: 'flex',
                        gap: 20,
                        marginTop: 8,
                        fontSize: 13,
                        color: C.muted,
                      },
                    },
                    h('span', null, '— Mean'),
                    h('span', { style: { color: C.green } }, '— ±1SD'),
	                    h('span', { style: { color: C.yellow } }, '— ±2SD'),
	                    h('span', { style: { color: C.red } }, '— ±3SD'),
	                    h(
	                      'span',
	                      { style: { color: '#a78bfa' } },
	                      '·· Prev Mean',
	                    ),
	                  ),
                ),

                h(
                  'div',
                  {
                    style: { display: 'flex', justifyContent: 'space-between' },
                  },
                  h(
                    'button',
                    { style: btnStyle('ghost'), onClick: () => setStep(0) },
                    '← Back',
                  ),
                  h(
                    'button',
                    { style: btnStyle('primary'), onClick: () => setStep(2) },
                    'Review & Generate Report →',
                  ),
                ),
              ),

            // ════════════════════════════════════════
            // STEP 2 — REPORT
            // ════════════════════════════════════════
            step === 2 &&
              h(
                'div',
                { className: 'report-root' },

                // Report header
                h(
                  'div',
                  {
                    style: { ...S.card, background: C.surface },
                    className: 'print-card report-header',
                  },
                  h(
                    'div',
                    {
                      style: {
                        display: 'flex',
                        justifyContent: 'space-between',
                        alignItems: 'flex-start',
                        marginBottom: 20,
                      },
                    },
                    h(
                      'div',
                      null,
                      h(
                        'div',
                        {
                          style: {
                            fontSize: 20,
                            fontWeight: 700,
                            marginBottom: 4,
                          },
                        },
                        'Reagent Lot Verification Report',
                      ),
                      h(
                        'div',
                        { style: { color: C.muted, fontSize: 13 } },
                        `${meta.analyte}${meta.instrument ? ' · ' + meta.instrument : ''}`,
                      ),
                      h(
                        'div',
                        {
                          style: { fontSize: 11, color: C.muted, marginTop: 4 },
                        },
                        'RCPAQAP Chemical Pathology APS — December 2022',
                      ),
                    ),
                    h(
                      'div',
                      { style: { textAlign: 'right' } },
                      // Overall verdict badge
                      h(
                        'div',
                        {
                          style: {
                            display: 'inline-block',
                            padding: '8px 18px',
                            borderRadius: 10,
                            fontSize: 14,
                            fontWeight: 700,
                            marginBottom: 8,
                            background:
                              overallVerdict === 'PASS'
                                ? C.greenBg
                                : overallVerdict === 'FAIL'
                                  ? C.redBg
                                  : C.yellowBg,
                            color:
                              overallVerdict === 'PASS'
                                ? C.green
                                : overallVerdict === 'FAIL'
                                  ? C.red
                                  : C.yellow,
                            border: `1px solid ${overallVerdict === 'PASS' ? C.greenBorder : overallVerdict === 'FAIL' ? C.redBorder : C.yellowBorder}`,
                          },
                        },
                        overallVerdict === 'PASS'
                          ? '✓ LOT ACCEPTED'
                          : overallVerdict === 'FAIL'
                            ? '✗ LOT REJECTED'
                            : '⚠ REQUIRES REVIEW',
                      ),
                      h(
                        'div',
                        {
                          style: {
                            color: C.muted,
                            fontSize: 12,
                            lineHeight: 1.8,
                          },
                        },
                        h('div', null, meta.date),
                        h('div', null, `Scientist: ${meta.analyst}`),
                      ),
                    ),
                  ),
                  h(
                    'div',
                    {
                      style: {
                        display: 'grid',
                        gridTemplateColumns: 'repeat(4,1fr)',
                        gap: 12,
                      },
                    },
                    ...[
                      ['New Lot', meta.newLot],
                      ['New Lot Expiry', meta.newLotExpiry || '—'],
                      ['Previous Lot', meta.prevLot],
                      ['Prev Lot Expiry', meta.prevLotExpiry || '—'],
                      ['Units', selectedUnit || '—'],
                      ['%CV Threshold', `≤${cvLimit}%`],
                      ['APS Analyte', meta.selectedAnalyte || 'Manual'],
                      ['APS Basis', apsData ? apsData.basis : '—'],
                    ].map(([k, v]) =>
                      h(
                        'div',
                        { key: k, style: S.sbox },
                        h(
                          'div',
                          { style: { fontSize: 13, fontWeight: 700 } },
                          v,
                        ),
                        h(
                          'div',
                          {
                            style: {
                              fontSize: 10,
                              color: C.muted,
                              letterSpacing: 1.5,
                              textTransform: 'uppercase',
                              marginTop: 4,
                            },
                          },
                          k,
                        ),
                      ),
                    ),
                  ),
                ),

                // Per-level cards
                ...LEVELS.map((lvl) => {
                  const s = stats[lvl],
                    p = prevStats[lvl],
                    b = biasResults[lvl];
                  const g = grubbsResults[lvl];
                  const hasPrev = p.mean !== '' && !isNaN(parseFloat(p.mean));
                  const cv = s.n > 0 ? cvStatus(s.cv, cvLimit) : null;
                  const biasPass = b ? b.pass : null;
                  const biasReview = b ? b.conversionWarning : false;
                  const levelStatus =
                    s.n === 0
                      ? 'no-data'
                      : cv === 'fail' || biasPass === false
                        ? 'fail'
                        : cv === 'warn' || biasReview
                          ? 'warn'
                          : cv === 'pass' && (biasPass === null || biasPass)
                            ? 'pass'
                            : 'warn';

                  const comments =
                    s.n > 0
                      ? generateComments({
                          levelName: lvl,
                          apsBiasResult: b,
                          cvResult:
                            s.n > 0
                              ? { pass: cv === 'pass', status: cv, cv: s.cv }
                              : null,
                          grubbsResult: g,
                          outlierExcluded: excludedOutliers[lvl] !== null,
                          prevStats: p,
                          newStats: s,
                          analyte: meta.analyte,
                          cvThreshold: cvLimit,
                        })
                      : [];

                  return h(
                    'div',
                    {
                      key: lvl,
                      style: {
                        ...S.card,
                        borderColor:
                          levelStatus === 'fail'
                            ? C.redBorder
                            : levelStatus === 'warn'
                              ? C.yellowBorder
                              : levelStatus === 'pass'
                                ? C.greenBorder
                                : C.border,
                      },
                      className: 'print-card qc-level-page',
                    },
                    h(
                      'div',
                      {
                        style: {
                          display: 'flex',
                          alignItems: 'center',
                          justifyContent: 'space-between',
                          marginBottom: 16,
                        },
                      },
                      h('div', { style: { ...S.sec, marginBottom: 0 } }, lvl),
                      levelStatus !== 'no-data' &&
                        badge(
                          levelStatus === 'pass'
                            ? 'pass'
                            : levelStatus === 'fail'
                              ? 'fail'
                              : 'warn',
                          levelStatus === 'pass'
                            ? 'ACCEPTABLE'
                            : levelStatus === 'fail'
                              ? 'REQUIRES ACTION'
                              : 'REVIEW NEEDED',
                        ),
                    ),

                    s.n === 0
                      ? h(
                          'div',
                          { style: { color: C.muted, fontSize: 12 } },
                          'No data entered for this level.',
                        )
                      : h(
                          'div',
                          null,

                          // Individual runs
                          h(
                            'div',
                            { style: { marginBottom: 16 } },
                            h(
                              'div',
                              {
                                style: {
                                  fontSize: 10,
                                  color: C.muted,
                                  letterSpacing: 1,
                                  marginBottom: 8,
                                },
                              },
                              'INDIVIDUAL RUNS (n=' + s.n + ')',
                            ),
                            h(
                              'div',
                              {
                                style: {
                                  display: 'flex',
                                  gap: 8,
                                  flexWrap: 'wrap',
                                },
                              },
                              ...runs[lvl].map((v, i) => {
                                const isExcl = excludedOutliers[lvl] === i;
                                const isFl = g && g.isOutlier && g.idx === i;
                                return h(
                                  'div',
                                  {
                                    key: i,
                                    style: {
                                      background: isExcl
                                        ? C.redBg
                                        : isFl
                                          ? C.yellowBg
                                          : C.surface,
                                      border: `1px solid ${isExcl ? C.redBorder : isFl ? C.yellowBorder : C.border}`,
                                      borderRadius: 6,
                                      padding: '6px 14px',
                                      fontSize: 13,
                                      opacity: isExcl ? 0.5 : 1,
                                    },
                                  },
                                  h(
                                    'span',
                                    {
                                      style: {
                                        color: isExcl
                                          ? C.red
                                          : isFl
                                            ? C.yellow
                                            : C.muted,
                                        fontSize: 10,
                                      },
                                    },
                                    `R${i + 1} `,
                                  ),
                                  v !== '' && !isNaN(parseFloat(v))
                                    ? fmt(parseFloat(v), 3)
                                    : '—',
                                  isExcl &&
                                    h(
                                      'span',
                                      {
                                        style: {
                                          color: C.red,
                                          fontSize: 10,
                                          marginLeft: 4,
                                        },
                                      },
                                      '[EXCL]',
                                    ),
                                );
                              }),
                            ),
                            excludedOutliers[lvl] !== null &&
                              h(
                                'div',
                                {
                                  style: {
                                    fontSize: 11,
                                    color: C.yellow,
                                    marginTop: 8,
                                  },
                                },
                                `Outlier excluded — Run ${excludedOutliers[lvl] + 1}: ${outlierReasons[lvl] || 'reason not documented'}`,
                              ),
                          ),

                          // Stats comparison
                          h(
                            'div',
                            {
                              style: {
                                display: 'grid',
                                gridTemplateColumns: hasPrev
                                  ? '1fr 1fr'
                                  : '1fr',
                                gap: 20,
                                marginBottom: 16,
                              },
                            },
                            h(
                              'div',
                              null,
                              h(
                                'div',
                                {
                                  style: {
                                    fontSize: 10,
                                    color: C.muted,
                                    letterSpacing: 1,
                                    marginBottom: 8,
                                  },
                                },
                                'NEW LOT STATISTICS — ' + meta.newLot,
                              ),
                              h(
                                'div',
                                { style: S.g3 },
                                ...[
                                  [
                                    `Mean${selectedUnit ? ' (' + selectedUnit + ')' : ''}`,
                                    fmt(s.mean),
                                    null,
                                  ],
                                  [
                                    `SD${selectedUnit ? ' (' + selectedUnit + ')' : ''}`,
                                    fmt(s.sd),
                                    null,
                                  ],
                                  ['%CV', fmt(s.cv, 2) + '%', cv],
                                ].map(([k, v, pass]) =>
                                  h(
                                    'div',
                                    {
                                      key: k,
                                      style: {
                                        ...S.sbox,
                                        border: `1px solid ${pass === 'fail' ? C.redBorder : pass === 'warn' ? C.yellowBorder : pass === 'pass' ? C.greenBorder : C.border}`,
                                      },
                                    },
                                    h(
                                      'div',
                                      {
                                        style: {
                                          fontSize: 14,
                                          fontWeight: 700,
                                          color:
                                            pass === 'fail'
                                              ? C.red
                                              : pass === 'warn'
                                                ? C.yellow
                                                : pass === 'pass'
                                                  ? C.green
                                                  : C.text,
                                        },
                                      },
                                      v,
                                    ),
                                    h(
                                      'div',
                                      {
                                        style: {
                                          fontSize: 10,
                                          color: C.muted,
                                          letterSpacing: 1,
                                          marginTop: 4,
                                          textTransform: 'uppercase',
                                        },
                                      },
                                      k,
                                      pass !== null &&
                                        badge(pass, cvStatusLabel(pass)),
                                    ),
                                  ),
                                ),
                              ),
                            ),

                            hasPrev &&
                              h(
                                'div',
                                null,
                                h(
                                  'div',
                                  {
                                    style: {
                                      fontSize: 10,
                                      color: C.muted,
                                      letterSpacing: 1,
                                      marginBottom: 8,
                                    },
                                  },
                                  'LOT-TO-LOT COMPARISON',
                                ),
                                h(
                                  'table',
                                  {
                                    style: {
                                      width: '100%',
                                      borderCollapse: 'collapse',
                                      fontSize: 12,
                                    },
                                  },
                                  h(
                                    'thead',
                                    null,
                                    h(
                                      'tr',
                                      null,
                                      ...[
                                        'Stat',
                                        'Prev Lot',
                                        'New Lot',
                                        'Δ',
                                        'Status',
                                      ].map((col) =>
                                        h(
                                          'th',
                                          {
                                            key: col,
                                            style: {
                                              color: C.muted,
                                              fontSize: 10,
                                              padding: '4px 8px',
                                              textAlign:
                                                col === 'Stat'
                                                  ? 'left'
                                                  : 'right',
                                              letterSpacing: 1,
                                            },
                                          },
                                          col,
                                        ),
                                      ),
                                    ),
                                  ),
                                  h(
                                    'tbody',
                                    null,
                                    ...(() => {
                                      const rows = [
                                        ['Mean', s.mean, parseFloat(p.mean)],
                                        ['SD', s.sd, parseFloat(p.sd)],
                                        ['%CV', s.cv, parseFloat(p.cv)],
                                      ];
                                      return rows
                                        .filter(([, , pv]) => !isNaN(pv))
                                        .map(([lbl, nv, pv]) => {
                                          const diff = nv - pv,
                                            pct =
                                              pv !== 0
                                                ? (diff / Math.abs(pv)) * 100
                                                : null;
                                          const dec = lbl === '%CV' ? 2 : 3;
                                          // For bias row, show APS pass/fail
                                          const isMean = lbl === 'Mean';
                                          const rowStatus =
                                            isMean && b
                                              ? b.conversionWarning
                                                ? 'warn'
                                                : b.pass
                                                  ? 'pass'
                                                  : 'fail'
                                              : null;
                                          return h(
                                            'tr',
                                            {
                                              key: lbl,
                                              style: {
                                                borderTop: `1px solid ${C.border}33`,
                                              },
                                            },
                                            h(
                                              'td',
                                              {
                                                style: {
                                                  color: C.muted,
                                                  padding: '5px 8px',
                                                },
                                              },
                                              lbl,
                                            ),
                                            h(
                                              'td',
                                              {
                                                style: {
                                                  color: C.text,
                                                  padding: '5px 8px',
                                                  textAlign: 'right',
                                                },
                                              },
                                              fmt(pv, dec),
                                            ),
                                            h(
                                              'td',
                                              {
                                                style: {
                                                  color: C.text,
                                                  padding: '5px 8px',
                                                  textAlign: 'right',
                                                },
                                              },
                                              fmt(nv, dec),
                                            ),
                                            h(
                                              'td',
                                              {
                                                style: {
                                                  padding: '5px 8px',
                                                  textAlign: 'right',
                                                  color:
                                                    Math.abs(diff) < 0.00001
                                                      ? C.muted
                                                      : diff > 0
                                                        ? C.yellow
                                                        : C.green,
                                                },
                                              },
                                              Math.abs(diff) < 0.00001
                                                ? '—'
                                                : `${diff > 0 ? '+' : ''}${fmt(diff, dec)}`,
                                            ),
                                            h(
                                              'td',
                                              {
                                                style: {
                                                  padding: '5px 8px',
                                                  textAlign: 'right',
                                                },
                                              },
                                              isMean && b
                                                ? badge(
                                                    rowStatus,
                                                    b.conversionWarning
                                                      ? 'REVIEW'
                                                      : b.pass
                                                        ? 'PASS'
                                                        : 'FAIL',
                                                  )
                                                : h(
                                                    'span',
                                                    {
                                                      style: { color: C.muted },
                                                    },
                                                    '—',
                                                  ),
                                            ),
                                          );
                                        });
                                    })(),
                                    // APS limit row
                                    b &&
                                      h(
                                        'tr',
                                        {
                                          key: 'aps',
                                          style: {
                                            borderTop: `1px solid ${C.border}`,
                                          },
                                        },
                                        h(
                                          'td',
                                          {
                                            style: {
                                              color: C.accent,
                                              padding: '5px 8px',
                                              fontSize: 11,
                                            },
                                            colSpan: 2,
                                          },
                                          'APS Limit',
                                        ),
                                        h(
                                          'td',
                                          {
                                            style: {
                                              color: C.text,
                                              padding: '5px 8px',
                                              textAlign: 'right',
                                              fontSize: 11,
                                            },
                                            colSpan: 3,
                                          },
                                          b.limitType,
                                        ),
                                      ),
                                  ),
                                ),
                              ),
                          ),

                          // LJ chart
                          h(
                            'div',
                            { style: { marginBottom: 16 } },
                            h(
                              'div',
                              {
                                style: {
                                  fontSize: 10,
                                  color: C.muted,
                                  letterSpacing: 1,
                                  marginBottom: 8,
                                },
                              },
                              'LEVEY-JENNINGS CHART',
                            ),
	                            h(LJChart, {
	                              runs: runs[lvl],
	                              mean: s.mean,
	                              sd: s.sd,
	                              prevMean: p.mean,
	                            }),
                          ),

                          // Auto-generated comments
                          comments.length > 0 &&
                            h(
                              'div',
                              {
                                style: {
                                  background: C.surface,
                                  border: `1px solid ${C.border}`,
                                  borderRadius: 9,
                                  padding: '14px 18px',
                                },
                              },
                              h(
                                'div',
                                {
                                  style: {
                                    fontSize: 14,
                                    color: C.accent,
                                    letterSpacing: 0,
                                    textTransform: 'none',
                                    marginBottom: 10,
                                    fontWeight: 700,
                                  },
                                },
                                'Auto-generated Assessment & Recommended Actions',
                              ),
                              ...comments.map((line, i) => {
                                const isAction = line.startsWith('  →');
                                const isFail = line.startsWith('⚠');
                                const isPass = line.startsWith('✓');
                                return h(
                                  'div',
                                  {
                                    key: i,
                                    style: {
                                      fontSize: 14,
                                      lineHeight: 1.7,
                                      marginBottom: isAction ? 8 : 4,
                                      color: isAction
                                        ? C.muted
                                        : isFail
                                          ? C.yellow
                                          : isPass
                                            ? C.green
                                            : C.text,
                                      paddingLeft: isAction ? 16 : 0,
                                      borderLeft: isAction
                                        ? `2px solid ${C.border}`
                                        : 'none',
                                      fontStyle: isAction ? 'normal' : 'normal',
                                    },
                                  },
                                  line,
                                );
                              }),
                            ),
                        ),
                  );
                }),

                // Overall assessment + monitoring comment
                h(
                  'div',
                  {
                    style: {
                      ...S.card,
                      borderColor:
                        overallVerdict === 'PASS'
                          ? C.greenBorder
                          : overallVerdict === 'FAIL'
                            ? C.redBorder
                            : C.yellowBorder,
                    },
                    className: 'print-card overall-page',
                  },
                  h(
                    'div',
                    { style: S.sec },
                    'Overall Assessment & Monitoring Plan',
                  ),

                  // Per-level summary
                  h(
                    'div',
                    { style: { marginBottom: 20 } },
                    ...LEVELS.filter((l) => stats[l].n > 0).map((lvl) => {
                      const s = stats[lvl],
                        b = biasResults[lvl];
                      const cv = cvStatus(s.cv, cvLimit),
                        biasPass = b ? b.pass : null;
                      const biasReview = b ? b.conversionWarning : false;
                      const rowStatus =
                        cv === 'fail' || biasPass === false
                          ? 'fail'
                          : cv === 'warn' || biasReview
                            ? 'warn'
                            : 'pass';
                      return h(
                        'div',
                        {
                          key: lvl,
                          style: {
                            display: 'flex',
                            alignItems: 'center',
                            gap: 12,
                            padding: '10px 14px',
                            borderRadius: 8,
                            marginBottom: 8,
                            background:
                              rowStatus === 'pass'
                                ? C.greenBg
                                : rowStatus === 'warn'
                                  ? C.yellowBg
                                  : C.redBg,
                            border: `1px solid ${rowStatus === 'pass' ? C.greenBorder : rowStatus === 'warn' ? C.yellowBorder : C.redBorder}`,
                          },
                        },
                        h(
                          'span',
                          { style: { fontSize: 16 } },
                          rowStatus === 'pass'
                            ? '✓'
                            : rowStatus === 'warn'
                              ? '⚠'
                              : '✗',
                        ),
                        h('span', { style: { flex: 1, fontSize: 13 } }, lvl),
                        h(
                          'span',
                          {
                            style: {
                              color:
                                rowStatus === 'pass'
                                  ? C.green
                                  : rowStatus === 'warn'
                                    ? C.yellow
                                    : C.red,
                              fontSize: 13,
                              fontWeight: 700,
                            },
                          },
                          rowStatus === 'pass'
                            ? 'ACCEPTABLE'
                            : rowStatus === 'warn'
                              ? 'WARNING'
                              : 'REQUIRES ACTION',
                        ),
                        h(
                          'div',
                          {
                            style: {
                              textAlign: 'right',
                              fontSize: 11,
                              color: C.muted,
                            },
                          },
                          h(
                            'div',
                            null,
                            `%CV: ${fmt(s.cv, 2)}% ${
                              cv === 'pass' ? '✓' : cv === 'warn' ? '⚠' : '✗'
                            }`,
                          ),
                          b &&
                            h(
                              'div',
                              null,
                              `Bias: ${fmt(b.diff, 3)}${b.unit ? ' ' + b.unit : ''} ${
                                b.conversionWarning ? '⚠' : b.pass ? '✓' : '✗'
                              }`,
                            ),
                        ),
                      );
                    }),
                  ),

                  // Monitoring / next steps section
                  h(
                    'div',
                    { style: { marginBottom: 20 } },
                    h(
                      'div',
                      {
                        style: {
                          fontSize: 10,
                          color: C.accent,
                          letterSpacing: 1.5,
                          textTransform: 'uppercase',
                          fontWeight: 700,
                          marginBottom: 10,
                        },
                      },
                      'QC Monitoring & Re-establishment Plan',
                    ),
                    overallVerdict === 'PASS'
                      ? h(
                          'div',
                          {
                            style: {
                              background: C.greenBg,
                              border: `1px solid ${C.greenBorder}`,
                              borderRadius: 9,
                              padding: '14px 18px',
                              fontSize: 12,
                              lineHeight: 1.8,
                              color: C.text,
                            },
                          },
                          h(
                            'div',
                            {
                              style: {
                                fontWeight: 700,
                                color: C.green,
                                marginBottom: 8,
                              },
                            },
                            '✓ New lot verified and accepted for clinical use.',
                          ),
                          h('div', null, 'Monitoring plan:'),
                          h(
                            'div',
                            {
                              style: {
                                paddingLeft: 16,
                                color: C.muted,
                                borderLeft: `2px solid ${C.greenBorder}`,
                                marginTop: 6,
                              },
                            },
                            h(
                              'div',
                              null,
                              '• QC will be monitored prospectively on the new lot from ' +
                                meta.date +
                                '.',
                            ),
                            h(
                              'div',
                              null,
                              '• Current QC targets (mean ± 2SD) will remain in use during the re-establishment phase.',
                            ),
                            h(
                              'div',
                              null,
                              '• Formal QC target update (new lot-specific mean and SD) will be performed after a minimum of 20 QC data points are accumulated.',
                            ),
                            h(
                              'div',
                              null,
                              '• Any evidence of drift, trending, or repeated Westgard rule violations during this period will trigger formal re-evaluation of lot acceptability.',
                            ),
                            h(
                              'div',
                              null,
                              '• If %CV or bias exceeds APS limits during routine monitoring, the lot will be re-assessed and manufacturer contacted if required.',
                            ),
                          ),
                        )
                      : overallVerdict === 'FAIL'
                        ? h(
                            'div',
                            {
                              style: {
                                background: C.redBg,
                                border: `1px solid ${C.redBorder}`,
                                borderRadius: 9,
                                padding: '14px 18px',
                                fontSize: 12,
                                lineHeight: 1.8,
                                color: C.text,
                              },
                            },
                            h(
                              'div',
                              {
                                style: {
                                  fontWeight: 700,
                                  color: C.red,
                                  marginBottom: 8,
                                },
                              },
                              '✗ New lot NOT accepted — investigation required before clinical use.',
                            ),
                            h(
                              'div',
                              {
                                style: {
                                  paddingLeft: 16,
                                  color: C.muted,
                                  borderLeft: `2px solid ${C.redBorder}`,
                                  marginTop: 6,
                                },
                              },
                              h(
                                'div',
                                null,
                                'Step 1: Verify QC material handling — check reconstitution, storage, and freeze-thaw history.',
                              ),
                              h(
                                'div',
                                null,
                                'Step 2: Repeat the 5-run verification at all failing levels.',
                              ),
                              h(
                                'div',
                                null,
                                'Step 3: Recalibrate the analyser with the new lot and repeat verification.',
                              ),
                              h(
                                'div',
                                null,
                                'Step 4: If still failing, perform patient sample comparison (minimum 10 samples spanning the AMR).',
                              ),
                              h(
                                'div',
                                null,
                                'Step 5: If patient samples confirm failure, contact the manufacturer with your data and request a replacement lot.',
                              ),
                              h(
                                'div',
                                null,
                                'Step 6: Continue using the previous lot until the new lot is accepted or a replacement is received.',
                              ),
                              h(
                                'div',
                                null,
                                'Step 7: Document all investigation steps, findings, and final decision with authorisation by a senior scientist or pathologist.',
                              ),
                              h(
                                'div',
                                null,
                                'DO NOT release patient results from the new lot until formal acceptance criteria are met.',
                              ),
                            ),
                          )
                        : h(
                            'div',
                            {
                              style: {
                                background: C.yellowBg,
                                border: `1px solid ${C.yellowBorder}`,
                                borderRadius: 9,
                                padding: '14px 18px',
                                fontSize: 12,
                                lineHeight: 1.8,
                                color: C.text,
                              },
                            },
                            h(
                              'div',
                              {
                                style: {
                                  fontWeight: 700,
                                  color: C.yellow,
                                  marginBottom: 8,
                                },
                              },
                              '⚠ Review required — some criteria not fully assessed.',
                            ),
                            h(
                              'div',
                              {
                                style: {
                                  paddingLeft: 16,
                                  color: C.muted,
                                  borderLeft: `2px solid ${C.yellowBorder}`,
                                  marginTop: 6,
                                },
                              },
	                              ...reportReviewMessages.map((msg) =>
	                                h('div', { key: msg }, msg),
	                              ),
	                            ),
	                          ),
                  ),

	                // Scientist notes
                  h(
                    'div',
                    { style: { marginBottom: 24 } },
                    h(
                      'label',
                      { style: S.lbl },
	                      'Scientist Notes / Additional Comments',
                    ),
                    h('textarea', {
                      style: { ...S.inp, height: 90, resize: 'vertical' },
                      value: meta.notes,
                      placeholder:
                        'Add any observations, deviations, or additional action items here...',
                      onChange: (e) => setMF('notes', e.target.value),
                    }),
                  ),

                  // Sign-off
                  h(
                    'div',
                    {
                      style: {
                        display: 'grid',
                        gridTemplateColumns: '1fr 1fr',
                        gap: 32,
                      },
                    },
                    h(
                      'div',
                      null,
                      h(
                        'div',
                        {
                          style: {
                            fontSize: 10,
                            color: C.muted,
                            letterSpacing: 1,
                            marginBottom: 10,
                          },
                        },
	                        'SCIENTIST SIGN-OFF',
                      ),
                      h(
                        'div',
                        {
                          style: {
                            borderBottom: `1px solid ${C.border}`,
                            paddingBottom: 6,
                            marginBottom: 6,
                            fontSize: 13,
                          },
                        },
                        meta.analyst,
                      ),
                      h(
                        'div',
                        { style: { fontSize: 11, color: C.muted } },
                        meta.date,
                      ),
                    ),
                    h(
                      'div',
                      null,
                      h(
                        'div',
                        {
                          style: {
                            fontSize: 10,
                            color: C.muted,
                            letterSpacing: 1,
                            marginBottom: 10,
                          },
                        },
                        'SENIOR SCIENTIST / PATHOLOGIST REVIEW',
                      ),
                      h(
                        'div',
                        {
                          style: {
                            borderBottom: `1px solid ${C.border}`,
                            paddingBottom: 6,
                            marginBottom: 6,
                            fontSize: 13,
                            height: 28,
                          },
                        },
                        meta.reviewer || '',
                      ),
                      h(
                        'div',
                        { style: { fontSize: 11, color: C.muted } },
                        'Date: ___________',
                      ),
                    ),
                  ),
                ),

                // Action buttons
                h(
                  'div',
                  {
                    className: 'no-print',
                    style: {
                      display: 'flex',
                      justifyContent: 'space-between',
                      gap: 12,
                    },
                  },
                  h(
                    'button',
                    { style: btnStyle('ghost'), onClick: () => setStep(1) },
                    '← Back to Data',
                  ),
                  h(
                    'div',
                    { style: { display: 'flex', gap: 12 } },
                    h(
                      'button',
                      { style: btnStyle('secondary'), onClick: exportCSV },
                      '↓ Export CSV',
                    ),
                    h(
                      'button',
                      {
                        style: btnStyle('primary'),
                        onClick: () => window.print(),
                      },
                      '🖨 Print / Save PDF',
                    ),
                  ),
                ),
              ),
          ),
          h(
            'footer',
            {
              className: 'no-print verifier-footer',
              style: {
                maxWidth: 1280,
                margin: '0 auto',
                padding: '0 40px 32px',
                color: C.muted,
                fontSize: 13,
                letterSpacing: 0,
                textAlign: 'center',
              },
            },
            `© ${new Date().getFullYear()} LabSight. Reagent Lot Verification Tool v1.1 for laboratory QC support.`,
          ),
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(h(App));
    </script>
  </body>
</html>
