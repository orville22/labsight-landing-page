      }

      }

        border-color: #8dbbff !important;
        box-shadow: 0 0 0 3px rgba(141, 187, 255, 0.16);
      }
      input[type='number']::-webkit-inner-spin-button {
        opacity: 0.4;
      }
      select option {
        background: #17243d;
        color: #f7fbff;
      }
      .report-root {
        display: flex;
        flex-direction: column;
      }
      .report-header {
        order: 1;
      }
      .overall-page {
        order: 2;
      }
      .qc-level-page {
        order: 3;
      }
      .report-root > .no-print {
        order: 4;
      }
      @media (max-width: 760px) {
        .labsight-nav-inner {
          align-items: flex-start !important;
          flex-direction: column !important;
          padding: 14px 18px !important;
        }
        .labsight-nav-links {
          justify-content: flex-start !important;
        }
        .verifier-title-shell,
        .verifier-stepper,
        .verifier-main,
        .verifier-footer {
          padding-left: 18px !important;
          padding-right: 18px !important;
        }
        .verifier-title-card {
          padding: 22px !important;
        }
        .verifier-stepper {
          overflow-x: auto !important;
        }
      }
      @media print {
        @page {
          size: A4;
          margin: 12mm;
        }
        .no-print {
          display: none !important;
        }
        body {
          background: white !important;
          color: #111 !important;
          font-size: 11px;
        }
        .print-card {
          background: #f8f8f8 !important;
          border-color: #ccc !important;
          color: #111 !important;
          box-shadow: none !important;
        }
        .report-root .print-card {
          margin-bottom: 0 !important;
          padding: 12px !important;
        }
        .overall-page,
        .qc-level-page {
          font-size: 10px !important;
          line-height: 1.35 !important;
        }
        .overall-page div,
        .qc-level-page div {
          line-height: 1.35 !important;
        }
        .overall-page textarea {
          height: 52px !important;
        }
        .qc-level-page table {
          font-size: 10px !important;
        }
        .print-white {
          background: white !important;
          color: #111 !important;
        }
        .report-header {
          order: 1;
          break-after: avoid;
          page-break-after: avoid;
          margin-bottom: 8px !important;
        }
        .report-root {
          display: flex !important;
          flex-direction: column !important;
        }
        .qc-level-page {
          order: 3;
          break-before: page;
          page-break-before: always;
          break-inside: avoid;
          page-break-inside: avoid;
          margin-bottom: 0 !important;
        }
        .overall-page {
          order: 2;
          break-inside: avoid;
          page-break-inside: avoid;
          margin-bottom: 0 !important;
        }

          border-color: #f87171 !important;
          color: #7f1d1d !important;
        }

          border-color: #34d399 !important;

        }
        .warn-box {
          background: #fffbeb !important;
          border-color: #fbbf24 !important;
          color: #78350f !important;

        'Cardiac / BNP': [
          'Troponin I',
          'Troponin T',
          'NT-Pro-BNP',
          'BNP',
          'CK-MB',
        ],
        'Tumour Markers': [
          'CEA',
          'CA125',
          'CA15-3',
          'CA19-9',
          'AFP',
          'Thyroglobulin',
        ],
        'Immunosuppressants / TDM': [
          'Cyclosporin',
          'Tacrolimus',
          'Sirolimus',
          'Vancomycin',
          'Gentamicin',
        ],
        'Haematology / Other': [
          'HbA1c (NGSP)',
          'HbA1c (IFCC)',
          'pH',
          'pCO2',
          'Ionised Calcium',
          'Ammonia',
        ],
        'Manual entry': ['Manual entry'],
      };

      const SORTED_APS_ANALYTES = Object.keys(APS_DATA)
        .filter((a) => a !== 'Manual entry')
        .sort((a, b) => a.localeCompare(b));

      const UNIT_OPTIONS = [
        '',
        'mmol/L',
        'µmol/L',
        'nmol/L',
        'pmol/L',
        'g/L',
        'mg/L',
        'µg/L',
        'ng/L',
        'U/L',
        'kU/L',
        'IU/L',
        'kIU/L',
        'mIU/L',
        'mU/L',
        'mmol/kg',
        'mmol/mol',
        '%',
        'mm Hg',
      ];

      function normalizeUnit(unit) {
        return String(unit || '')
          .trim()
          .replace(/ug/g, 'µg')
          .replace(/uIU/g, 'µIU')
          .replace(/uU/g, 'µU')
          .replace(/\s+/g, ' ');
      }

      function unitToBaseFactor(unit) {
        const u = normalizeUnit(unit);
        const map = {
          'pmol/L': { family: 'mol/L', factor: 1e-12 },
          'nmol/L': { family: 'mol/L', factor: 1e-9 },
          'µmol/L': { family: 'mol/L', factor: 1e-6 },
          'mmol/L': { family: 'mol/L', factor: 1e-3 },
          'mol/L': { family: 'mol/L', factor: 1 },
          'ng/L': { family: 'g/L', factor: 1e-9 },
          'µg/L': { family: 'g/L', factor: 1e-6 },
          'mg/L': { family: 'g/L', factor: 1e-3 },
          'g/L': { family: 'g/L', factor: 1 },
          'mU/L': { family: 'U/L', factor: 1e-3 },
          'U/L': { family: 'U/L', factor: 1 },
          'kU/L': { family: 'U/L', factor: 1e3 },
          'mIU/L': { family: 'IU/L', factor: 1e-3 },
          'IU/L': { family: 'IU/L', factor: 1 },
          'kIU/L': { family: 'IU/L', factor: 1e3 },
          '%': { family: '%', factor: 1 },
          'mmol/kg': { family: 'mmol/kg', factor: 1 },
          'mmol/mol': { family: 'mmol/mol', factor: 1 },
          'mm Hg': { family: 'mm Hg', factor: 1 },
          '': { family: '', factor: 1 },
        };
        return map[u] || null;
      }

      function unitFactor(fromUnit, toUnit) {
        const from = unitToBaseFactor(fromUnit);
        const to = unitToBaseFactor(toUnit);
        if (!from || !to || from.family !== to.family) return null;
        return from.factor / to.factor;
      }

      function convertUnitValue(value, fromUnit, toUnit) {
        const factor = unitFactor(fromUnit, toUnit);
        if (
          factor === null ||
          value === null ||
          value === undefined ||
          isNaN(value)
        )
          return null;
        return Number(value) * factor;
      }

      function formatUnitLabel(unit) {
        return normalizeUnit(unit) || 'unitless';
      }

      // ── Statistical helpers ────────────────────────────────────
      function calcStats(values) {
        const nums = values
          .filter((v) => v !== '' && !isNaN(parseFloat(v)))
          .map(Number);
        if (!nums.length)
          return { mean: null, sd: null, cv: null, n: 0, values: nums };
        const mean = nums.reduce((a, b) => a + b, 0) / nums.length;
        const sd =
          nums.length > 1
            ? Math.sqrt(
                nums.reduce((a, b) => a + Math.pow(b - mean, 2), 0) /
                  (nums.length - 1),
              )
            : 0;
        const cv = mean !== 0 ? (sd / mean) * 100 : 0;
        return { mean, sd, cv, n: nums.length, values: nums };
      }

      function grubbs(values) {
        // Returns index of outlier candidate and G statistic, or null
        const nums = values.map(Number);
        if (nums.length < 4) return null;
        const mean = nums.reduce((a, b) => a + b, 0) / nums.length;
        const sd = Math.sqrt(
          nums.reduce((a, b) => a + Math.pow(b - mean, 2), 0) /
            (nums.length - 1),
        );
        if (sd === 0) return null;
        let maxG = 0,
          maxIdx = -1;
        nums.forEach((v, i) => {
          const G = Math.abs(v - mean) / sd;
          if (G > maxG) {
            maxG = G;
            maxIdx = i;
          }
        });
        const critical =
          nums.length === 5 ? GRUBBS_CRITICAL_N5 : GRUBBS_CRITICAL_N4;
        return {
          idx: maxIdx,
          G: maxG,
          critical,
          isOutlier: maxG > critical,
          value: nums[maxIdx],
        };
      }

      function checkAPS(mean, apsData) {
        if (!apsData || mean === null) return null;
        if (apsData.fixedLimit !== undefined) {
          return { limit: apsData.fixedLimit, type: 'fixed', pass: null }; // can't check without old lot
        }
        return {
          lowerAbs: apsData.lowerAbs,
          lowerConc: apsData.lowerConc,
          upperPct: apsData.upperPct,
        };
      }

      function conciseNumber(value, dec = 3) {
        if (value === null || value === undefined || isNaN(value)) return '—';
        return Number(value)
          .toFixed(dec)
          .replace(/\.?0+$/, '');
      }

      function apsBiasCheck(oldMean, newMean, apsData, userUnit) {
        if (!apsData || oldMean === null || newMean === null) return null;
        const apsUnit = normalizeUnit(apsData.units);
        const labUnit = normalizeUnit(userUnit || apsUnit);
        const toAps = unitFactor(labUnit, apsUnit);
        const toLab = unitFactor(apsUnit, labUnit);
        const diffLabDirect = Math.abs(newMean - oldMean);
        const pctDiff = (diffLabDirect / Math.abs(oldMean)) * 100;

        if (toAps === null || toLab === null) {
          return {
            pass: null,
            diff: diffLabDirect,
            pctDiff,
            limit: null,
            limitType: `APS unit ${formatUnitLabel(apsUnit)} is not convertible to selected unit ${formatUnitLabel(labUnit)}`,
            absLimit: null,
            unit: labUnit,
            conversionWarning: true,
          };
        }

        const oldMeanAps = oldMean * toAps;
        const newMeanAps = newMean * toAps;
        const diffAps = Math.abs(newMeanAps - oldMeanAps);
        const diff = diffAps * toLab;
        const unitSuffix = labUnit ? ` ${labUnit}` : '';
        const convertedNote =
          labUnit !== apsUnit && apsUnit
            ? `; converted from APS ${apsUnit}`
            : '';
        let limit, limitType;
        if (apsData.fixedLimit !== undefined) {
          limit = apsData.fixedLimit * toLab;
          limitType = `± ${conciseNumber(limit)}${unitSuffix} (fixed${convertedNote})`;
          return {
            pass: diffAps <= apsData.fixedLimit,
            diff,
            pctDiff,
            limit,
            limitType,
            absLimit: limit,
            unit: labUnit,
            apsDiff: diffAps,
            apsLimit: apsData.fixedLimit,
          };
        }
        if (oldMeanAps <= apsData.lowerConc) {
          limit = apsData.lowerAbs * toLab;
          const cutover = apsData.lowerConc * toLab;
          limitType = `± ${conciseNumber(limit)}${unitSuffix} below ${conciseNumber(cutover)}${unitSuffix} (absolute${convertedNote})`;
          return {
            pass: diffAps <= apsData.lowerAbs,
            diff,
            pctDiff,
            limit,
            limitType,
            absLimit: limit,
            unit: labUnit,
            apsDiff: diffAps,
            apsLimit: apsData.lowerAbs,
          };
        } else {
          limit = apsData.upperPct;
          const absEquiv = (apsData.upperPct / 100) * Math.abs(oldMean);
          limitType = `± ${apsData.upperPct}% (= ± ${conciseNumber(absEquiv)}${unitSuffix})`;
          return {
            pass: pctDiff <= limit,
            diff,
            pctDiff,
            limit,
            limitType,
            absLimit: absEquiv,
            unit: labUnit,
            apsDiff: diffAps,
            apsLimit: (apsData.upperPct / 100) * Math.abs(oldMeanAps),
          };
        }
      }

      function fmt(val, dec = 3) {
        if (val === null || val === undefined || isNaN(val)) return '—';
        return Number(val).toFixed(dec);
      }

      function todayLocalISO() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      }

      function cvStatus(cv, threshold) {
        if (cv === null || cv === undefined || isNaN(cv)) return null;
        if (cv <= threshold) return 'pass';
        return cv < 10 ? 'warn' : 'fail';
      }

      function cvStatusLabel(status) {
        if (status === 'pass') return 'PASS';
        if (status === 'warn') return 'WARNING';
        if (status === 'fail') return 'FAIL';
        return '—';
      }

      // ── Levey-Jennings Chart ───────────────────────────────────
      function LJChart({ runs, mean, sd, prevMean }) {
        const validPts = runs
          .map((v, i) => ({
            i,
            v: v !== '' && !isNaN(parseFloat(v)) ? parseFloat(v) : null,
          }))
          .filter((p) => p.v !== null);
        const previousMean =
          prevMean !== '' &&
          prevMean !== null &&
          prevMean !== undefined &&
          !isNaN(parseFloat(prevMean))
            ? parseFloat(prevMean)
            : null;
        if (!mean || sd === null || validPts.length < 2) {
          return h(
            'div',
            {
              style: {
                color: C.muted,
                textAlign: 'center',
                padding: '24px 0',
                fontSize: 12,
              },
            },
            'Enter at least 2 values to display chart',
          );
        }
        const W = 580,
          H = 190,
          PAD = { top: 14, right: 56, bottom: 26, left: 56 };
        const plotW = W - PAD.left - PAD.right,
          plotH = H - PAD.top - PAD.bottom;
        const baseMin = mean - 3.6 * sd;
        const baseMax = mean + 3.6 * sd;
        const yMin =
          previousMean !== null ? Math.min(baseMin, previousMean - 0.6 * sd) : baseMin;
        const yMax =
          previousMean !== null ? Math.max(baseMax, previousMean + 0.6 * sd) : baseMax;
        const yRange = yMax - yMin;
        const xScale = (idx) => PAD.left + (idx / (N_RUNS - 1)) * plotW;
        const yScale = (v) => PAD.top + plotH - ((v - yMin) / yRange) * plotH;
        const refLines = [
          { y: mean + 3 * sd, color: C.red, dash: '4,3', label: '+3SD' },
          { y: mean + 2 * sd, color: C.yellow, dash: '4,3', label: '+2SD' },
          { y: mean + sd, color: C.green, dash: '3,3', label: '+1SD' },
          { y: mean, color: C.accent, dash: '6,3', label: 'Mean' },
          { y: mean - sd, color: C.green, dash: '3,3', label: '−1SD' },
          { y: mean - 2 * sd, color: C.yellow, dash: '4,3', label: '−2SD' },
          { y: mean - 3 * sd, color: C.red, dash: '4,3', label: '−3SD' },
        ];
        const prevLine =
          previousMean !== null
            ? {
                y: previousMean,
                color: '#a78bfa',
                dash: '2,2',
                label: 'Prev Mean',
              }
            : null;
        return h(
          'svg',
          {
            viewBox: `0 0 ${W} ${H}`,
            style: { width: '100%', maxWidth: W, display: 'block' },
          },
          ...[...refLines, prevLine].filter(Boolean).map((r, i) => {
            const y = yScale(r.y);
            return h(
              'g',
              { key: i },
              h('line', {
                x1: PAD.left,
                y1: y,
                x2: PAD.left + plotW,
                y2: y,
                stroke: r.color,
                strokeDasharray: r.dash,
                strokeOpacity: 0.7,
                strokeWidth: 1.2,
              }),
              h(
                'text',
                {
                  x: PAD.left + plotW + 4,
                  y: y + 4,
                  fontSize: 9,
                  fill: r.color,
                  opacity: 0.85,
                },
                r.label,
              ),
              h(
                'text',
                {
                  x: PAD.left - 6,
                  y: y + 4,
                  fontSize: 9,
                  fill: C.muted,
                  textAnchor: 'end',
                },
                fmt(r.y, 2),
              ),
            );
          }),
          ...Array(N_RUNS)
            .fill(null)
            .map((_, i) =>
              h(
                'text',
                {
                  key: i,
                  x: xScale(i),
                  y: H - PAD.bottom + 14,
                  fontSize: 9,
                  fill: C.muted,
                  textAnchor: 'middle',
                },
                `R${i + 1}`,
              ),
            ),
          validPts.length > 1 &&
            h('polyline', {
              points: validPts
                .map((p) => `${xScale(p.i)},${yScale(p.v)}`)
                .join(' '),
              fill: 'none',
              stroke: C.accent,
              strokeWidth: 2,
              strokeLinejoin: 'round',
            }),
          ...validPts.map((p, i) => {
            const out2 = Math.abs(p.v - mean) > 2 * sd,
              out3 = Math.abs(p.v - mean) > 3 * sd;
            return h('circle', {
              key: i,
              cx: xScale(p.i),
              cy: yScale(p.v),
              r: 5,
              fill: out3 ? C.red : out2 ? C.yellow : C.accent,
              stroke: C.bg,
              strokeWidth: 1.5,
            });
          }),
        );
      }

      // ── Auto-generate investigation comments ──────────────────
      function generateComments({
        levelName,
        apsBiasResult,
        cvResult,
        grubbsResult,
        outlierExcluded,
        prevStats,
        newStats,
        analyte,
        cvThreshold,
      }) {
        const lines = [];

        // APS bias check
        if (apsBiasResult) {
          if (apsBiasResult.conversionWarning) {
            lines.push(
              `⚠ BIAS REVIEW REQUIRED at ${levelName}: ${apsBiasResult.limitType}. Enter a compatible unit or review bias manually.`,
            );
          } else if (!apsBiasResult.pass) {
            const severity =
              apsBiasResult.diff > apsBiasResult.absLimit * 1.5
                ? 'significant'
                : 'marginal';
            const unitSuffix = apsBiasResult.unit
              ? ` ${apsBiasResult.unit}`
              : '';
            lines.push(
              `⚠ BIAS EXCEEDED at ${levelName}: Observed difference of ${fmt(apsBiasResult.diff, 3)}${unitSuffix} (${fmt(apsBiasResult.pctDiff, 1)}%) exceeds the RCPAQAP APS limit of ${apsBiasResult.limitType}. This is a ${severity} exceedance.`,
            );
            lines.push(
              `  → Recommended actions: (1) Verify QC reconstitution and handling were correct. (2) Repeat the 5-run verification at this level. (3) If still failing, recalibrate the analyser with the new lot and repeat. (4) If failure persists after recalibration, perform patient sample comparison (minimum 10 samples across the AMR). (5) If patient samples also show bias, contact the manufacturer and place the new lot on hold.`,
            );
          } else {
            const pct =
              apsBiasResult.pctDiff !== undefined
                ? ` (${fmt(apsBiasResult.pctDiff, 1)}%)`
                : '';
            const unitSuffix = apsBiasResult.unit
              ? ` ${apsBiasResult.unit}`
              : '';
            lines.push(
              `✓ BIAS ACCEPTABLE at ${levelName}: Difference of ${fmt(apsBiasResult.diff, 3)}${unitSuffix}${pct} is within the APS limit of ${apsBiasResult.limitType}.`,
            );
          }
        } else if (
          prevStats &&
          prevStats.mean !== '' &&
          !isNaN(parseFloat(prevStats.mean))
        ) {
          lines.push(
            `  Note: APS data not available for ${levelName}. Manual review of bias against laboratory-defined acceptance criteria required.`,
          );
        }

        // CV check
        if (cvResult !== null) {
          if (
            cvResult.status === 'fail' ||
            (!cvResult.pass && !cvResult.status)
          ) {
            lines.push(
              `⚠ %CV FAILED at ${levelName}: New lot %CV of ${fmt(cvResult.cv, 2)}% is ≥10% and exceeds the laboratory threshold of ≤${cvThreshold}%. This may indicate poor precision or reagent instability.`,
            );
            lines.push(
              `  → Recommended actions: (1) Check for outliers using Grubbs test (see below). (2) Inspect for pre-analytical issues (pipetting errors, reagent mixing). (3) Compare against historical %CV from previous lot — if similar, may reflect inherent assay imprecision. (4) Monitor precision over the next 20 QC data points during the re-establishment phase.`,
            );
          } else if (cvResult.status === 'warn') {
            lines.push(
              `⚠ %CV WARNING at ${levelName}: New lot %CV of ${fmt(cvResult.cv, 2)}% exceeds the laboratory threshold of ≤${cvThreshold}% but remains below 10%. Review precision and monitor closely during the re-establishment phase.`,
            );
          } else {
            lines.push(
              `✓ %CV ACCEPTABLE at ${levelName}: New lot %CV of ${fmt(cvResult.cv, 2)}% is within the ≤${cvThreshold}% threshold.`,
            );
          }
        }

        // Grubbs outlier
        if (grubbsResult && grubbsResult.isOutlier) {
          if (outlierExcluded) {
            lines.push(
              `⚠ OUTLIER DETECTED and EXCLUDED at ${levelName}: Run ${grubbsResult.idx + 1} (value: ${fmt(grubbsResult.value, 3)}) was identified as a statistical outlier by Grubbs test (G = ${fmt(grubbsResult.G, 3)} > critical value ${grubbsResult.critical}). This value has been excluded from calculations. An outlier reason must be documented. Note: maximum 1 outlier may be excluded per level; minimum 4 values required.`,
            );
          } else {
            lines.push(
              `⚠ OUTLIER DETECTED (NOT EXCLUDED) at ${levelName}: Run ${grubbsResult.idx + 1} (value: ${fmt(grubbsResult.value, 3)}) flagged by Grubbs test (G = ${fmt(grubbsResult.G, 3)} > critical value ${grubbsResult.critical}). Consider excluding this value if a valid pre-analytical reason can be identified.`,
            );
          }
        }

        return lines;
      }

      // ── App ────────────────────────────────────────────────────
      function App() {
        const [step, setStep] = useState(0);
        const [meta, setMeta] = useState({
          analyte: '',
          instrument: '',
          newLot: '',
          prevLot: '',
          newLotExpiry: '',
          prevLotExpiry: '',
          analyst: '',
          reviewer: '',
          date: todayLocalISO(),
          notes: '',
          units: '',
          cvThreshold: '5',
          selectedAnalyte: '',
          manualApsLower: '',
          manualApsLowerConc: '',
          manualApsUpperPct: '',
        });
        const [runs, setRuns] = useState(
          LEVELS.reduce((a, l) => ({ ...a, [l]: Array(N_RUNS).fill('') }), {}),
        );
        const [prevStats, setPrevStats] = useState(
          LEVELS.reduce(
            (a, l) => ({ ...a, [l]: { mean: '', sd: '', cv: '' } }),
            {},
          ),
        );
        const [excludedOutliers, setExcludedOutliers] = useState(
          LEVELS.reduce((a, l) => ({ ...a, [l]: null }), {}),
        );
        const [outlierReasons, setOutlierReasons] = useState(
          LEVELS.reduce((a, l) => ({ ...a, [l]: '' }), {}),
        );
        const [activeLevel, setActiveLevel] = useState(LEVELS[0]);

        const setMF = (f, v) => setMeta((m) => ({ ...m, [f]: v }));
        const selectAnalyte = (v) =>
          setMeta((m) => {
            if (!v) return { ...m, analyte: '', selectedAnalyte: '' };
            if (v === 'Manual entry') {
              return { ...m, analyte: '', selectedAnalyte: 'Manual entry' };
            }
            const aps = APS_DATA[v];
            return {
              ...m,
              analyte: v,
              selectedAnalyte: v,
              units: aps && aps.units ? aps.units : m.units,
            };
          });
        const setManualAnalyte = (v) =>
          setMeta((m) => ({
            ...m,
            analyte: v,
            selectedAnalyte: 'Manual entry',
          }));

        // Determine APS data
        const apsData = useMemo(() => {
          const sel = meta.selectedAnalyte;
          if (!sel || sel === 'Manual entry') {
            const la = parseFloat(meta.manualApsLower);
            const lc = parseFloat(meta.manualApsLowerConc);
            const up = parseFloat(meta.manualApsUpperPct);
            if (!isNaN(la) && !isNaN(lc) && !isNaN(up)) {
              return {
                lowerAbs: la,
                lowerConc: lc,
                upperPct: up,
                units: meta.units,
                basis: 'Manual',
                level: '',
              };
            }
            return null;
          }
          return APS_DATA[sel] || null;
        }, [
          meta.selectedAnalyte,
          meta.manualApsLower,
          meta.manualApsLowerConc,
          meta.manualApsUpperPct,
          meta.units,
        ]);

        const apsUnit = apsData ? normalizeUnit(apsData.units) : '';
        const selectedUnit = normalizeUnit(meta.units || apsUnit);
        const apsToSelectedFactor = apsData
          ? unitFactor(apsUnit, selectedUnit)
          : null;
        const apsDisplayUnit =
          apsData && apsToSelectedFactor === null ? apsUnit : selectedUnit;
        const apsLowerAbsDisplay =
          apsData && apsToSelectedFactor !== null && apsData.lowerAbs !== null
            ? apsData.lowerAbs * apsToSelectedFactor
            : apsData
              ? apsData.lowerAbs
              : null;
        const apsLowerConcDisplay =
          apsData && apsToSelectedFactor !== null && apsData.lowerConc !== null
            ? apsData.lowerConc * apsToSelectedFactor
            : apsData
              ? apsData.lowerConc
              : null;
        const apsFixedLimitDisplay =
          apsData &&
          apsToSelectedFactor !== null &&
          apsData.fixedLimit !== undefined
            ? apsData.fixedLimit * apsToSelectedFactor
            : apsData
              ? apsData.fixedLimit
              : null;
        const apsConversionText =
          apsData &&
          apsUnit &&
          selectedUnit &&
          apsUnit !== selectedUnit &&
          apsToSelectedFactor !== null
            ? `APS limits converted from ${apsUnit} to ${selectedUnit} for display and reporting.`
            : '';

        // Stats per level (with outlier exclusion)
        const stats = useMemo(() => {
          return LEVELS.reduce((a, l) => {
            const excluded = excludedOutliers[l];
            const filteredRuns =
              excluded !== null
                ? runs[l].map((v, i) => (i === excluded ? '' : v))
                : runs[l];
            return { ...a, [l]: calcStats(filteredRuns) };
          }, {});
        }, [runs, excludedOutliers]);

        // Grubbs per level
        const grubbsResults = useMemo(() => {
          return LEVELS.reduce((a, l) => {
            const validRuns = runs[l].filter(
              (v) => v !== '' && !isNaN(parseFloat(v)),
            );
            if (validRuns.length < 4) return { ...a, [l]: null };
            return { ...a, [l]: grubbs(validRuns) };
          }, {});
        }, [runs]);

        // APS bias check per level
        const biasResults = useMemo(() => {
          return LEVELS.reduce((a, l) => {
            const s = stats[l];
            const p = prevStats[l];
            if (
              !apsData ||
              s.mean === null ||
              p.mean === '' ||
              isNaN(parseFloat(p.mean))
            )
              return { ...a, [l]: null };
            return {
              ...a,
              [l]: apsBiasCheck(
                parseFloat(p.mean),
                s.mean,
                apsData,
                selectedUnit,
              ),
            };
          }, {});
        }, [stats, prevStats, apsData, selectedUnit]);

        const cvLimit = parseFloat(meta.cvThreshold) || 5;

        const allFilled = LEVELS.every(
          (l) =>
            runs[l].filter((v) => v !== '' && !isNaN(parseFloat(v))).length >=
            4,
        );
        const hasPrevData = LEVELS.some(
          (l) =>
            prevStats[l].mean !== '' && !isNaN(parseFloat(prevStats[l].mean)),
        );

        // Overall verdict
        const overallVerdict = useMemo(() => {
          const results = LEVELS.map((l) => {
            const s = stats[l];
            const bias = biasResults[l];
            const cv = s.mean !== null ? cvStatus(s.cv, cvLimit) : null;
            const biasPass = bias ? bias.pass : null;
            const biasReview = bias ? bias.conversionWarning : false;
            return { level: l, cv, biasPass, biasReview };
          }).filter((r) => stats[r.level].mean !== null);

          const anyFail = results.some(
            (r) => r.cv === 'fail' || r.biasPass === false,
          );
          const anyWarn = results.some((r) => r.cv === 'warn' || r.biasReview);
          const allPass = results.every(
            (r) =>
              (r.cv === null || r.cv === 'pass') &&
              (r.biasPass === null || r.biasPass) &&
              !r.biasReview,
          );
          return anyFail ? 'FAIL' : allPass && !anyWarn ? 'PASS' : 'REVIEW';
        }, [stats, biasResults, cvLimit]);

        const reportReviewMessages = useMemo(() => {
          const testedLevels = LEVELS.filter((l) => stats[l].n > 0);
          const messages = [];

          const cvWarningLevels = testedLevels.filter(
            (l) => cvStatus(stats[l].cv, cvLimit) === 'warn',
          );
          if (cvWarningLevels.length) {
            messages.push(
              `• %CV exceeds the laboratory threshold but remains <10% at ${cvWarningLevels.join(', ')} — review precision and monitor closely during QC re-establishment.`,
            );
          }

          const unitReviewLevels = testedLevels.filter(
            (l) => biasResults[l] && biasResults[l].conversionWarning,
          );
          if (unitReviewLevels.length) {
            messages.push(
              `• APS bias could not be automatically assessed at ${unitReviewLevels.join(', ')} because the selected unit is not convertible to the APS unit — enter a compatible unit or review bias manually.`,
            );
          }

          const missingPrevLevels = testedLevels.filter(
            (l) =>
              apsData &&
              (prevStats[l].mean === '' || isNaN(parseFloat(prevStats[l].mean))),
          );
          if (missingPrevLevels.length) {
            messages.push(
              `• Previous lot mean was not entered for ${missingPrevLevels.join(', ')} — APS bias check could not be completed for those level(s).`,
            );
          }

          if (
            testedLevels.length &&
            !apsData &&
            meta.selectedAnalyte === 'Manual entry'
          ) {
            messages.push(
              '• Manual APS criteria are incomplete — enter the absolute limit, cutover concentration, and high-concentration % limit to enable APS bias assessment.',
            );
          }

          if (!messages.length) {
            messages.push(
              '• One or more criteria require senior scientist review before final lot acceptance.',
            );
          }

          messages.push(
            '• Continue QC monitoring closely and document any observed shifts or trends.',
          );
          return messages;
        }, [stats, biasResults, cvLimit, apsData, prevStats, meta.selectedAnalyte]);

            // ════════════════════════════════════════
            // STEP 0 — SETUP
            // ════════════════════════════════════════
            step === 0 &&
              h(
                'div',
                null,

                // Details card
                h(
                  'div',
                  { style: S.card },
                  h('div', { style: S.sec }, 'Experiment Details'),
                  h(
                    'div',
                    { style: { ...S.g2, marginBottom: 16 } },
                    h(
                      'div',
                      { key: 'analyte' },
                      h('label', { style: S.lbl }, 'Analyte / Test Name *'),
                      h(

                        {

                          onChange: (e) => selectAnalyte(e.target.value),
                        },
                        h('option', { value: '' }, '— Select analyte —'),
                        ...SORTED_APS_ANALYTES.map((a) =>
                          h('option', { key: a, value: a }, a),
                        ),
                        h('option', { value: 'Manual entry' }, 'Manual entry'),
                      ),
                      meta.selectedAnalyte === 'Manual entry' &&
                        h('input', {

                    ...[

                          ),
                        ),
                      ),
                    ),
                  ),
                ),

                h(
                  'div',
                  { style: { display: 'flex', justifyContent: 'flex-end' } },
                  h(
                    'button',
                    {
                      style: {
                        ...btnStyle('primary'),
                        opacity:
                          !meta.analyte ||
                          !meta.newLot ||
                          !meta.prevLot ||
                          !meta.analyst
                            ? 0.4
                            : 1,

                      disabled:
                        !meta.analyte ||
                        !meta.newLot ||
                        !meta.prevLot ||
                        !meta.analyst,
                      onClick: () => setStep(1),
